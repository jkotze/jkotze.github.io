<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Jacques Kotze — links, contact, and Arclio." />
  <meta name="theme-color" content="#0a0a0f" />
  <meta property="og:title" content="Jacques Kotze" />
  <meta property="og:description" content="Links, contact, and Arclio." />
  <meta property="og:image" content="https://github.com/jkotze.png" />
  <meta property="og:type" content="website" />
  <title>Jacques Kotze</title>
  <link rel="preconnect" href="https://github.com" crossorigin />
  <link rel="preconnect" href="https://framerusercontent.com" crossorigin />
  <link rel="icon" href="https://github.com/jkotze.png" />
  <style>
    :root {
      --fg: rgba(255, 255, 255, 0.96);
      --fg-dim: rgba(255, 255, 255, 0.62);
      --glass: rgba(255, 255, 255, 0.05);
      --glass-hi: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.1);
      --border-hi: rgba(167, 139, 250, 0.35);
      --accent: #a78bfa;
      --accent-2: #60a5fa;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100vh; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      color: var(--fg);
      background: #0a0a0f;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 0%, rgba(167, 139, 250, 0.28), transparent 55%),
        radial-gradient(ellipse 70% 55% at 85% 100%, rgba(96, 165, 250, 0.22), transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(236, 72, 153, 0.08), transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 20px 56px;
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px 28px;
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      backdrop-filter: blur(24px) saturate(140%);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .hero { text-align: center; }

    .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      display: block;
      margin: 0 auto 18px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.4), 0 0 0 6px rgba(167, 139, 250, 0.08);
    }

    h1 {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .tag {
      color: var(--fg-dim);
      font-size: 14.5px;
      line-height: 1.5;
      max-width: 360px;
      margin: 0 auto;
    }

    .brand-chip {
      display: none;
      align-items: center;
      gap: 6px;
      margin: 10px auto 0;
      padding: 4px 10px 4px 6px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 12px;
      color: var(--fg-dim);
      width: fit-content;
    }
    .brand-chip img { width: 16px; height: 16px; border-radius: 4px; }
    .mode-business .brand-chip { display: inline-flex; }

    .tabs {
      display: flex;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      margin: 26px 0 18px;
    }
    .tab {
      flex: 1;
      padding: 9px 12px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--fg-dim);
      background: none;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.2s, background 0.2s;
    }
    .tab[aria-selected="true"] {
      color: var(--fg);
      background: var(--glass-hi);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
    }

    .section { display: none; }
    .section.active { display: block; }

    .links { display: flex; flex-direction: column; gap: 10px; }

    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.15s, transform 0.15s, border-color 0.15s;
    }
    .link:hover {
      background: var(--glass-hi);
      border-color: var(--border-hi);
      transform: translateY(-1px);
    }
    .link .ico { width: 20px; height: 20px; flex-shrink: 0; }
    .link .ico.rounded { border-radius: 4px; }
    .link .label { flex: 1; }
    .link .arrow { opacity: 0.35; transition: opacity 0.15s, transform 0.15s; }
    .link:hover .arrow { opacity: 1; transform: translateX(2px); }

    .link.primary {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.22), rgba(96, 165, 250, 0.22));
      border-color: rgba(167, 139, 250, 0.4);
    }
    .link.primary:hover {
      background: linear-gradient(135deg, rgba(167, 139, 250, 0.32), rgba(96, 165, 250, 0.32));
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 22px 0 18px;
    }

    .contact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .contact button, .contact a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--fg);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s;
    }
    .contact button:hover, .contact a:hover {
      background: var(--glass-hi);
      border-color: var(--border-hi);
    }
    .contact .ico { width: 16px; height: 16px; }

    .foot {
      text-align: center;
      font-size: 11.5px;
      color: var(--fg-dim);
      margin-top: 24px;
      letter-spacing: 0.02em;
    }

    .qr-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .qr-backdrop.show { display: flex; opacity: 1; }

    .qr-dialog {
      background: #141420;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 300px;
      width: 100%;
      text-align: center;
    }
    .qr-dialog h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .qr-dialog p { font-size: 12.5px; color: var(--fg-dim); margin-bottom: 18px; }
    .qr-canvas {
      background: #fff;
      padding: 14px;
      border-radius: 12px;
      display: inline-block;
      line-height: 0;
    }
    .qr-canvas img, .qr-canvas svg { display: block; width: 200px; height: 200px; }
    .qr-close {
      margin-top: 18px;
      width: 100%;
      padding: 10px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13.5px;
    }
    .qr-close:hover { background: var(--glass-hi); }

    @media (max-width: 380px) {
      main { padding: 28px 14px 40px; }
      .card { padding: 26px 18px 22px; }
      h1 { font-size: 23px; }
      .avatar { width: 96px; height: 96px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <main>

            <span class="label">GitHub</span>
            <span class="arrow">→</span>
          </a>
          <a class="link" href="https://twitter.com/J_Kotze" target="_blank" rel="noopener">
            <svg class="ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

            <svg class="ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005.8 20.1a6.34 6.34 0 0010.86-4.43v-7a8.16 8.16 0 004.77 1.52v-3.4a4.85 4.85 0 01-1.84-.1z"/></svg>

      </div>

      <div class="section" data-section="business">
        <div class="links">
          <a class="link primary" href="https://www.arclio.ai" target="_blank" rel="noopener">
            <img class="ico rounded" src="https://framerusercontent.com/images/eDobkXabuBEi37FPsHTAtxcNqvM.png" alt="" />

            <svg class="ico" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.47-.9 1.63-1.85 3.36-1.85 3.59 0 4.26 2.36 4.26 5.44v6.3zM5.34 7.43a2.06 2.06 0 110-4.12 2.06 2.06 0 010 4.12zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.98 0 1.78-.77 1.78-1.72V1.72C24 .77 23.2 0 22.22 0z"/></svg>

    <p class="foot">© 2026 Jacques Kotze</p>

  <div class="qr-backdrop" id="qr-backdrop" role="dialog" aria-modal="true" aria-labelledby="qr-title">
    <div class="qr-dialog">
      <h3 id="qr-title">Scan with your phone</h3>
      <p>Opens this page on mobile.</p>
      <div class="qr-canvas" id="qr-canvas"></div>
      <button type="button" class="qr-close" id="qr-close">Close</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    const TEL = '+1 (929) 224-4237';
    const SITE_URL = 'https://jkotze.github.io';

    const taglines = {
      personal: 'Builder, operator, product person.',
      business: 'Stop waiting on analysts. Talk to your data directly.'
    };
    const emails = {
      personal: 'jacques.kotze@gmail.com',
      business: 'jacques.kotze@arclio.ai'
    };

    const card = document.getElementById('card');
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('.section');
    const tag = document.getElementById('tag');
    const emailLink = document.getElementById('email-link');

    let currentMode = 'personal';
    const validModes = ['personal', 'business'];

    function setMode(mode, updateHash = true) {
      if (!validModes.includes(mode)) mode = 'personal';
      currentMode = mode;
      tabs.forEach(t => t.setAttribute('aria-selected', t.dataset.mode === mode ? 'true' : 'false'));
      sections.forEach(s => s.classList.toggle('active', s.dataset.section === mode));
      tag.textContent = taglines[mode];
      emailLink.href = 'mailto:' + emails[mode];
      card.classList.toggle('mode-business', mode === 'business');
      if (updateHash && location.hash !== '#' + mode) {
        history.replaceState(null, '', '#' + mode);
      }
    }

    tabs.forEach(t => t.addEventListener('click', () => setMode(t.dataset.mode)));
    window.addEventListener('hashchange', () => setMode(location.hash.slice(1), false));
    setMode(location.hash.slice(1), false);

    document.getElementById('save-contact').addEventListener('click', () => {
      const lines = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'FN:Jacques Kotze',
        'N:Kotze;Jacques;;;',
        'ORG:Arclio',
        'EMAIL;TYPE=WORK:jacques.kotze@arclio.ai',
        'EMAIL;TYPE=HOME:jacques.kotze@gmail.com',
        'URL:https://www.arclio.ai',
        'URL:https://www.linkedin.com/in/kotzejacques/',
        'PHOTO;VALUE=URI:https://github.com/jkotze.png'
      ];
      if (TEL) lines.push('TEL;TYPE=CELL:' + TEL);
      lines.push('END:VCARD');
      const blob = new Blob([lines.join('\r\n')], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'jacques-kotze.vcf';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    });

    const qrBackdrop = document.getElementById('qr-backdrop');
    const qrCanvas = document.getElementById('qr-canvas');
    document.getElementById('show-qr').addEventListener('click', () => {
      if (typeof qrcode !== 'function') {
        qrCanvas.innerHTML = '<p style="color:#000;font-size:12px;max-width:180px">QR library failed to load. Visit ' + SITE_URL + ' directly.</p>';
        qrBackdrop.classList.add('show');
        return;
      }
      try {
        const qr = qrcode(0, 'M');
        qr.addData(SITE_URL + '#' + currentMode);
        qr.make();
        qrCanvas.innerHTML = '<img src="' + qr.createDataURL(8, 4) + '" alt="QR code">';
        qrBackdrop.classList.add('show');
      } catch (err) {
        qrCanvas.innerHTML = '<p style="color:#000;font-size:12px">Failed to generate QR: ' + err.message + '</p>';
        qrBackdrop.classList.add('show');
      }
    });
    const closeQr = () => qrBackdrop.classList.remove('show');
    document.getElementById('qr-close').addEventListener('click', closeQr);
    qrBackdrop.addEventListener('click', e => { if (e.target === qrBackdrop) closeQr(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeQr(); });
  </script>
</body>
